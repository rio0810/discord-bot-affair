services:
  db:
    image: postgres:18
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d postgres_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    container_name: bot
    depends_on:
      db:
        condition: service_healthy
    restart: always
    env_file:
      - .env
    volumes:
      - .:/bot
    environment:
      - TZ=Asia/Tokyo

volumes:
  db_data:
